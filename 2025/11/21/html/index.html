h=device-width, initial-scale=1.0&quot;</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!-- 配置网页关键字 --&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">meta</span> <span class="attr">name</span>=<span class="string">&quot;keywords&quot;</span> <span class="attr">content</span>=<span class="string">&quot;html，前端&quot;</span>&gt;</span></span><br><span class="line">        <span class="comment">&lt;!-- 配置网页描述信息 --&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">meta</span> <span class="attr">name</span>=<span class="string">&quot;description&quot;</span> <span class="attr">content</span>=<span class="string">&quot;本网页是我用来学习 html 的部分笔记&quot;</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">title</span>&gt;</span>某人看唐诡<span class="tag">&lt;/<span class="name">title</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">head</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">body</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">marquee</span> <span class="attr">loop</span>=<span class="string">“1”</span>&gt;</span></span><br><span class="line">        一只鬼两只鬼三只鬼</span><br><span class="line">        <span class="comment">&lt;!-- 请在下面输入框中输入 --&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">input</span> <span class="attr">type</span>=<span class="string">“text”</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;/<span class="name">marquee</span>&gt;</span></span><br><span class="line">        <span class="comment">&lt;!-- 下方输入框不滚动 注释快捷键 ctrl+/ --&gt;</span></span><br><span class="line">        <span class="comment">&lt;!--块级元素，独占一行 行内不写块级 p 标签内不写块级--&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class
